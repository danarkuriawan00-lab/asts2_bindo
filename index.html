<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Asesmen SDN 1 Gondang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0284c7;
            --secondary-blue: #93c5fd;
            --accent-green: #10b981;
            --bg-gray: #f3f4f6;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background-color: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .app-container {
                height: 90vh;
                border-radius: 24px;
            }
        }

        .font-sahabat {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.3));
        }

        .btn-masuk {
            background-color: var(--accent-green);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-masuk:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-nav {
            background-color: var(--primary-blue);
            border-radius: 12px;
            color: white;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .option-item {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e5e7eb;
            background-color: #f9fafb;
        }

        .selected-option {
            background-color: #dbeafe !important;
            border-color: #3b82f6 !important;
            transform: translateX(8px);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }

        .input-field {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            border: 2px solid #cbd5e1;
            outline: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container p-6" id="app">
    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-14 w-14 border-4 border-blue-400 border-t-transparent mb-4"></div>
        <p class="font-bold text-lg">Memproses Data...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-full">
        <div class="mb-6">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiUAgnz3M-C0b4aP4NCccOVpRTBjimetBgZhyphenhyphenkGcMIcG3YY7RhacnjOZFFonylLQGbQ0LQHR7n4cOk7XN8mDb9YmRrXgJi5q7yZCEEKpQ4CYuB9WaZLCNw35_qVPvcRTizOMvZXsYVqmAOSfxDv9bUmpB9z_-2G3ecR_C1CONgsQ5-5U5NA2B9rpU4zfJnZ/w200-h200/sdn%20gng%201.png" alt="Logo SDN 1 Gondang" class="w-28 h-28 object-contain">
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 leading-tight uppercase">Selamat Datang</h1>
            <h2 class="text-5xl font-black mb-2 font-sahabat uppercase">Sahabat</h2>
            <p class="text-[10px] text-gray-600 font-medium tracking-widest uppercase text-center">
                Sistem Asesmen Hasil Amanah Berprestasi Akurat & Terpercaya
            </p>
        </div>

        <div class="w-full space-y-4">
            <input type="text" id="name" placeholder="NAMA LENGKAP" class="input-field uppercase">
            <input type="number" id="absen" placeholder="NOMOR ABSEN" class="input-field">
            <button onclick="startExam()" class="w-full py-4 mt-2 rounded-xl btn-masuk text-white font-bold text-lg shadow-lg uppercase">
                Mulai Ujian
            </button>
        </div>
    </div>

    <!-- Exam Screen -->
    <div id="exam-screen" class="hidden flex flex-col h-full">
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
            <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase">
                Soal <span id="current-number">1</span> / <span id="total-questions">0</span>
            </span>
            <span id="timer" class="text-gray-700 font-mono font-bold text-sm">00:00</span>
        </div>
        
        <div class="flex-grow">
            <div class="bg-blue-50 rounded-2xl p-5 mb-6 border-l-4 border-blue-600">
                <p id="question-text" class="text-base font-bold text-gray-800 leading-relaxed">Memuat...</p>
            </div>
            <div id="options-container" class="space-y-3"></div>
        </div>

        <div class="flex justify-between items-center mt-6 pb-4 gap-3">
            <button onclick="prevQuestion()" id="prev-btn" class="btn-nav flex-1 opacity-50" disabled>KEMBALI</button>
            <button onclick="handleNext()" class="btn-nav flex-1" id="next-btn">LANJUT</button>
        </div>
    </div>
</div>

<div id="confirm-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="text-xl font-bold mb-2">Selesai?</h3>
        <p class="text-sm text-gray-600 mb-6">Pastikan semua jawaban sudah terisi.</p>
        <div class="flex gap-3">
            <button onclick="hideConfirm()" class="flex-1 py-3 border border-gray-300 rounded-xl font-bold text-gray-500">BATAL</button>
            <button onclick="finishExam()" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-bold">KIRIM</button>
        </div>
    </div>
</div>

    options: [{id:'A', text:'Ditulis dengan angka (5)'}, {id:'B', text:'Ditulis dengan huruf (lima)'}, {id:'C', text:'Boleh keduanya'}, {id:'D', text:'Ditulis miring'}], 
    correct: 'B' 
  },
  { 
    id: 47, 
    text: "Penulisan bilangan tingkat yang benar adalah ....", 
    options: [{id:'A', text:'Abad ke 20'}, {id:'B', text:'Abad ke-20'}, {id:'C', text:'Abad ke XX'}, {id:'D', text:'Abad 20'}], 
    correct: 'B' 
  },
  { 
    id: 48, 
    text: "Pilihlah kalimat dengan penulisan angka yang benar ....", 
    options: [{id:'A', text:'Ayah membeli tiga ekor ayam.'}, {id:'B', text:'Ayah membeli 3 ekor ayam.'}, {id:'C', text:'Ayah membeli III ekor ayam.'}, {id:'D', text:'Ayah membeli t-i-g-a ekor ayam.'}], 
    correct: 'A' 
  },
  { 
    id: 49, 
    text: "Untuk menyatakan jumlah yang besar (misal: uang atau penduduk), angka digunakan agar ....", 
    options: [{id:'A', text:'Mudah dibaca'}, {id:'B', text:'Terlihat indah'}, {id:'C', text:'Menghemat kertas'}, {id:'D', text:'Terkesan modern'}], 
    correct: 'A' 
  },
  { 
    id: 50, 
    text: "Lambang bilangan pada awal kalimat tidak boleh ditulis dengan angka. Jika angka itu besar, maka caranya adalah ....", 
    options: [{id:'A', text:'Tetap ditulis angka'}, {id:'B', text:'Mengubah susunan kalimatnya'}, {id:'C', text:'Dihapus saja angkanya'}, {id:'D', text:'Ditulis menggunakan angka romawi'}], 
    correct: 'B' 
  }
    ];

    let currentQuestionIndex = 0;
    let userAnswers = {};
    let userData = { name: '', absen: '' };
    let startTime;
    let timerInterval;

    function startExam() {
        userData.name = document.getElementById('name').value.trim();
        userData.absen = document.getElementById('absen').value.trim();

        if (!userData.name || !userData.absen) {
            alert("Isi Nama dan Absen!");
            return;
        }

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('exam-screen').classList.remove('hidden');
        document.getElementById('total-questions').innerText = questions.length;
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        renderQuestion();
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        const m = Math.floor(diff / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('current-number').innerText = currentQuestionIndex + 1;
        document.getElementById('question-text').innerText = q.text;
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const isSelected = userAnswers[currentQuestionIndex] === opt.id;
            const div = document.createElement('div');
            div.className = `option-item p-4 rounded-xl font-medium flex items-center shadow-sm ${isSelected ? 'selected-option' : ''}`;
            div.innerHTML = `
                <div class="w-7 h-7 rounded-full flex items-center justify-center mr-3 text-xs font-bold ${isSelected ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}">
                    ${opt.id}
                </div>
                <span class="text-sm">${opt.text}</span>
            `;
            div.onclick = () => { 
                userAnswers[currentQuestionIndex] = opt.id; 
                renderQuestion(); 
            };
            container.appendChild(div);
        });

        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('prev-btn').style.opacity = currentQuestionIndex === 0 ? '0.5' : '1';
        document.getElementById('next-btn').innerText = currentQuestionIndex === questions.length - 1 ? "SELESAI" : "LANJUT";
    }

    function handleNext() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        } else {
            document.getElementById('confirm-modal').style.display = 'flex';
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function hideConfirm() { 
        document.getElementById('confirm-modal').style.display = 'none'; 
    }

    async function finishExam() {
        hideConfirm();
        clearInterval(timerInterval);
        document.getElementById('loading-overlay').style.display = 'flex';

        let correct = 0;
        questions.forEach((q, i) => { if (userAnswers[i] === q.correct) correct++; });
        const score = Math.round((correct / questions.length) * 100);

        const payload = new URLSearchParams();
        payload.append('timestamp', new Date().toLocaleString());
        payload.append('nama', userData.name);
        payload.append('absen', userData.absen);
        payload.append('skor', score);
        payload.append('durasi', document.getElementById('timer').innerText);

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: payload });
            showResult(score, correct);
        } catch (e) {
            showResult(score, correct);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function showResult(score, correct) {
        document.getElementById('exam-screen').innerHTML = `
            <div class="flex flex-col items-center justify-center text-center h-full py-6">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h1 class="text-xl font-black mb-1">UJIAN SELESAI</h1>
                <p class="text-xs text-gray-500 mb-6">${userData.name} - Absen ${userData.absen}</p>
                
                <div class="text-6xl font-black text-blue-600 mb-6">${score}</div>

                <div class="grid grid-cols-2 gap-3 w-full mb-6">
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="text-[10px] text-gray-400">Benar</div>
                        <div class="text-lg font-bold text-green-600">${correct}</div>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="text-[10px] text-gray-400">Salah</div>
                        <div class="text-lg font-bold text-red-500">${questions.length - correct}</div>
                    </div>
                </div>

                <button onclick="location.reload()" class="btn-nav w-full py-3 uppercase">Kembali</button>
            </div>
        `;
    }
</script>
